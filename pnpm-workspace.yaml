# Require packages to be published for at least 7 days before installation.
# Mitigates supply chain attacks — malicious releases are typically discovered
# and removed within hours/days of publication.
minimumReleaseAge: 10080
# Escape hatch for security patches younger than the cooldown:
# esbuild >=0.28.1 fixes GHSA-gv7w-rqvm-qjhr (audit gate fails below it).
minimumReleaseAgeExclude:
  - esbuild
  - "@esbuild/*"
