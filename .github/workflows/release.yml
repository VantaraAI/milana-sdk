name: Release

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    permissions:
      contents: read
    uses: ./.github/workflows/ci-checks.yml

  publish:
    name: Publish to npm & CDN
    needs: check
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ESM
        run: pnpm build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid version tag: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Publish to npm
        # TODO: Remove --provenance=false when the repo is made public
        run: npm publish --access public --provenance=false

      - name: Build CDN bundle
        run: pnpm build:cdn

      - name: Upload versioned CDN bundle
        run: |
          gsutil cp dist/cdn/milana.js "gs://${{ secrets.CDN_BUCKET }}/milana-${{ steps.version.outputs.version }}.js"
          gsutil cp dist/cdn/milana.js "gs://${{ secrets.CDN_BUCKET }}/milana.js"

      - name: Invalidate CDN cache for latest bundle
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ secrets.CDN_URL_MAP }} \
            --path "/milana.js" \
            --async
